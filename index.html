<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#f4f7fb" />
    <title>ماسح الباركود</title>
    <link rel="stylesheet" href="./styles.css?v=20260611-4" />
    <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js" defer></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js" defer></script>
    <script src="./app.js?v=20260611-6" defer></script>
  </head>
  <body>
    <div id="scan-flash" class="scan-flash" aria-hidden="true" hidden></div>
    <main class="app-shell">
      <section class="latest-panel" aria-live="polite">
        <small>آخر باركود</small>
        <strong id="last-barcode">لسه مفيش باركود</strong>
        <span><b id="total-count">0</b> باركود محفوظ</span>
      </section>

      <section class="scanner-panel" aria-labelledby="scanner-title">
        <h1 id="scanner-title" class="sr-only">تسجيل الحضور</h1>
        <p id="camera-status" class="sr-only" aria-live="polite">اضغط تشغيل الكاميرا للبدء.</p>

        <form id="manual-form" class="manual-form compact">
          <label for="manual-code">إدخال يدوي</label>
          <div class="manual-row">
            <input
              id="manual-code"
              name="manual-code"
              type="tel"
              inputmode="numeric"
              pattern="[0-9]*"
              autocomplete="off"
              placeholder="اكتب الباركود هنا"
            />
            <button type="submit" class="secondary">إضافة</button>
          </div>
        </form>

        <div id="reader" class="reader" aria-label="منطقة قراءة الباركود"></div>
        <p id="scan-toast" class="scan-toast" aria-live="polite" hidden></p>

        <div class="actions scanner-actions">
          <button id="start-scan" type="button">تشغيل الكاميرا</button>
          <button id="stop-scan" type="button" class="secondary" disabled>إيقاف</button>
        </div>
      </section>

      <section class="data-panel" aria-labelledby="data-title">
        <div class="panel-header">
          <div>
            <h2 id="data-title">الباركودات المحفوظة</h2>
            <p>صدر الداتا بنهاية اليوم</p>
          </div>
          <div class="actions">
            <button id="export-xlsx" type="button">تصدير Excel</button>
            <button id="share-whatsapp" type="button" class="whatsapp-button" aria-label="تصدير وإرسال واتساب" title="تصدير وإرسال واتساب">
              <svg viewBox="0 0 32 32" aria-hidden="true" focusable="false">
                <path d="M16 3a12.8 12.8 0 0 0-11 19.4L3.8 29l6.8-1.8A12.8 12.8 0 1 0 16 3Zm0 2.5a10.3 10.3 0 0 1 8.7 15.8 10.3 10.3 0 0 1-12.9 3.5l-.5-.2-4 1 .7-3.9-.3-.5A10.3 10.3 0 0 1 16 5.5Zm-4.1 4.9c-.2 0-.6.1-.9.5-.3.4-1.1 1.1-1.1 2.6s1.1 3 1.3 3.2c.2.2 2.1 3.4 5.2 4.6 2.6 1 3.1.8 3.7.8.6-.1 1.8-.8 2.1-1.5.3-.7.3-1.3.2-1.5-.1-.1-.3-.2-.7-.4l-2.1-1c-.3-.1-.6-.2-.8.2-.2.3-.9 1.1-1.1 1.3-.2.2-.4.2-.8.1-.4-.2-1.5-.6-2.8-1.7-1-1-1.7-2.1-1.9-2.5-.2-.3 0-.5.1-.7l.5-.6c.2-.2.2-.3.3-.5.1-.2.1-.4 0-.6l-1-2.3c-.2-.5-.4-.5-.7-.5h-.5Z" />
              </svg>
            </button>
          </div>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>الباركود</th>
                <th>حذف</th>
              </tr>
            </thead>
            <tbody id="barcode-list"></tbody>
          </table>
          <p id="empty-state" class="empty-state">لسه مفيش باركودات محفوظة.</p>
        </div>
      </section>
    </main>
  </body>
</html>
